<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>XL Cafe & Billiards — Where Moments Become Legends</title>
    <meta name="description" content="XL Cafe & Billiards — A premier digital experience for an iconic multi-space venue featuring a premium rock venue, luxury billiard lounge, and avant-garde cafe." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="XL Cafe & Billiards" />
    <meta property="og:description" content="Where music, billiards, and culture converge. Three spaces. One experience." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="XL Cafe & Billiards" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="XL Cafe & Billiards" />
    <meta name="twitter:description" content="Where music, billiards, and culture converge." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Theme & PWA -->
    <meta name="theme-color" content="#0a0a0c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="XL" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <style>
      html, body {
        touch-action: pan-y;
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
      }
      @media (max-width: 768px) {
        body { font-size: 14px; }
      }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
