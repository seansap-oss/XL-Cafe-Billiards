<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon-192.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>XL Cafe & Billiards</title>
    <meta name="description" content="Scan. Earn. Claim. The XL rewards experience for cafe, billiards, and live music." />
    <meta name="theme-color" content="#0a0a0c" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="XL Cafe & Billiards" />
    <meta property="og:description" content="Where music, billiards, and culture converge." />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #0a0a0c;
        touch-action: pan-y;
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
        -webkit-tap-highlight-color: transparent;
      }
      @media (max-width: 768px) {
        body { font-size: 14px; }
      }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          transition-duration: 0.01ms !important;
        }
      }
      @keyframes fade-in {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in { animation: fade-in 0.5s ease forwards; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
